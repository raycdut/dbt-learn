version: 2

sources:
  - name: adventureworks
    description: "AdventureWorks OLTP 源数据（通过 dbt seed 从 CSV 加载）"
    database: dev
    schema: main
    loader: seed

    freshness:
      warn_after: {count: 1, period: day}
      error_after: {count: 7, period: day}

    tables:
      - name: sales_order_header
        identifier: "Sales_SalesOrderHeader"
        description: "销售订单头表 — 每行一个订单，含日期/金额/客户"
        loaded_at_field: ModifiedDate
        columns:
          - name: SalesOrderID
            description: "订单ID（主键）"
          - name: OrderDate
            description: "订单日期"
          - name: DueDate
            description: "应到货日期"
          - name: ShipDate
            description: "发货日期"
          - name: Status
            description: "订单状态码"
          - name: OnlineOrderFlag
            description: "是否在线订单"
          - name: CustomerID
            description: "客户ID"
          - name: SubTotal
            description: "小计金额"
          - name: TaxAmt
            description: "税额"
          - name: Freight
            description: "运费"
          - name: TotalDue
            description: "到期应付总额"

      - name: sales_order_detail
        loaded_at_field: ModifiedDate
        identifier: "Sales_SalesOrderDetail"
        description: "销售订单明细行 — 每行一个商品条目"
        columns:
          - name: SalesOrderID
            description: "订单ID（外键 → sales_order_header）"
          - name: SalesOrderDetailID
            description: "明细行ID（主键）"
          - name: OrderQty
            description: "数量"
          - name: ProductID
            description: "产品ID"
          - name: SpecialOfferID
            description: "促销ID"
          - name: UnitPrice
            description: "单价"
          - name: UnitPriceDiscount
            description: "单价折扣"
          - name: LineTotal
            description: "行总额"

      - name: customer
        loaded_at_field: ModifiedDate
        identifier: "Sales_Customer"
        description: "客户信息 — 关联门店或自然人"
        columns:
          - name: CustomerID
            description: "客户ID（主键）"
          - name: PersonID
            description: "自然人ID（外键 → person）"
          - name: StoreID
            description: "门店ID（外键 → store）"
          - name: TerritoryID
            description: "销售区域ID"
          - name: AccountNumber
            description: "客户编号"

      - name: store
        loaded_at_field: ModifiedDate
        identifier: "Sales_Store"
        description: "门店信息"
        columns:
          - name: BusinessEntityID
            description: "门店ID（主键）"
          - name: Name
            description: "门店名称"
          - name: SalesPersonID
            description: "销售人员ID"

      - name: person
