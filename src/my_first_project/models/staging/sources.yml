        identifier: "Person_Person"
        description: "自然人信息（包括员工/客户/供应商联系人）"
        columns:
          - name: BusinessEntityID
            description: "业务实体ID（主键）"
          - name: PersonType
            description: "人员类型（SC=门店客户/IN=个人客户/EM=员工/VC=供应商联系人）"
          - name: Title
            description: "称谓"
          - name: FirstName
            description: "名"
          - name: MiddleName
            description: "中间名"
          - name: LastName
            description: "姓"

