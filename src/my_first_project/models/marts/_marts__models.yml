version: 2

models:
  - name: dim_product
    description: |-
      产品维度表 — 含品类层级（product → subcategory → category）。
      
      上游：int_product_hierarchy
      用于：fct_order_details 及 ad-hoc 产品分析
    columns:
      - name: product_id
        description: "产品ID（主键）"
        tests: [unique, not_null]
      - name: product_name
        description: "产品名称"
      - name: product_number
        description: "产品编号"
      - name: color
        description: "颜色"
      - name: safety_stock_level
        description: "安全库存水平"
      - name: reorder_point
        description: "再订购点"
      - name: standard_cost
        description: "标准成本"
      - name: list_price
        description: "标价"
      - name: days_to_manufacture
        description: "制造天数"
      - name: product_line
        description: "产品线"
      - name: class
        description: "等级"
      - name: style
        description: "款式"
      - name: subcategory_name
        description: "子品类名称"
      - name: category_name
        description: "大类品类名称"
      - name: sell_start_date
        description: "销售开始日期"
      - name: sell_end_date
        description: "销售结束日期"

  - name: dim_customer
    description: |-
      客户维度表 — 含个人客户和门店客户的统一视图。
      
      上游：int_customer_info
      客户类型分类：STORE（门店）/ INDIVIDUAL（个人）/ STORE_CONTACT（门店联系人）/ OTHER
    columns:
      - name: customer_id
        description: "客户ID（主键）"
        tests: [unique, not_null]
      - name: account_number
        description: "客户编号"
      - name: territory_id
        description: "销售区域ID"
      - name: person_business_entity_id
        description: "关联自然人业务实体ID"
      - name: person_type_code
        description: "人员类型代码"
      - name: full_name
        description: "完整姓名"
      - name: first_name
        description: "名"
      - name: middle_name
        description: "中间名"
      - name: last_name
        description: "姓"
      - name: title
        description: "称谓"
      - name: store_business_entity_id
        description: "关联门店业务实体ID"
      - name: store_name
        description: "门店名称"
      - name: customer_type
        description: "客户类型（STORE/INDIVIDUAL/STORE_CONTACT/OTHER）"

  - name: dim_territory
    description: |-
      销售区域维度表。
      
      上游：stg_territory
      含年初至今销售额/成本数据，用于区域分析
    columns:
      - name: territory_id
        description: "区域ID（主键）"
        tests: [unique, not_null]
      - name: territory_name
        description: "区域名称"
      - name: country_region_code
        description: "国家/地区代码"
      - name: region_group
        description: "大区分组"
      - name: sales_ytd
        description: "年初至今销售额"
      - name: sales_last_year
        description: "去年销售额"
      - name: cost_ytd
        description: "年初至今成本"
      - name: cost_last_year
        description: "去年成本"

  - name: dim_ship_method
    description: |-
      配送方式维度表。
      
      上游：stg_ship_method
    columns:
      - name: ship_method_id
        description: "配送方式ID（主键）"
        tests: [unique, not_null]
      - name: ship_method_name
        description: "配送方式名称"
      - name: ship_base
        description: "基础运费"
      - name: ship_rate
        description: "运费费率"

  - name: dim_date
    description: |-
      日期维度表 — 从订单日期范围自动生成。
      
      含年/季/月/星期/周末标识等属性，用于时间序列分析
    columns:
      - name: date_key
        description: "日期键（YYYYMMDD 格式整型，主键）"
        tests: [unique, not_null]
      - name: date
        description: "日期"
      - name: year
        description: "年份"
      - name: quarter
        description: "季度（1-4）"
      - name: month
        description: "月份（1-12）"
      - name: day_of_month
        description: "日"
      - name: day_of_week
        description: "星期几（1=周日, 7=周六）"
      - name: day_of_year
        description: "年中第几天"
      - name: day_name
        description: "星期名称"
      - name: month_name
        description: "月份名称"
      - name: year_quarter
        description: "年-季度（如 2013-Q1）"
      - name: year_month
        description: "年-月（如 2013-06）"
      - name: is_weekend
        description: "是否周末"

  - name: fct_order_details
    description: |-
      订单明细事实表 — 行级粒度。
      
      上游：int_order_details
      每行对应一个订单明细行（sales_order_detail），含产品/区域/配送维度信息
    columns:
      - name: order_detail_key
        description: "订单明细键（主键）"
        tests: [unique, not_null]
      - name: sales_order_id
        description: "订单ID"
      - name: sales_order_detail_id
        description: "明细行ID"
      - name: customer_id
        description: "客户ID"
      - name: product_id
        description: "产品ID"
      - name: special_offer_id
        description: "促销ID"
      - name: order_date
        description: "订单日期"
      - name: due_date
        description: "应到货日期"
      - name: ship_date
        description: "发货日期"
      - name: order_qty
        description: "订购数量"
      - name: unit_price
        description: "单价"
      - name: unit_price_discount
        description: "单价折扣"
      - name: line_total
        description: "行总额"
      - name: subtotal
        description: "订单小计"
      - name: tax_amt
        description: "税费"
      - name: freight
        description: "运费"
      - name: total_due
        description: "应付总额"
      - name: status_code
        description: "订单状态码"
      - name: is_online_order
        description: "是否在线订单"
      - name: territory_name
        description: "销售区域名称"
      - name: region_group
        description: "大区分组"
      - name: ship_method_name
        description: "配送方式名称"
      - name: category_name
        description: "品类名称"
      - name: subcategory_name
        description: "子品类名称"

  - name: dim_vendor
    description: |-
      供应商维度表。
      
      上游：stg_purchasing_vendor
    columns:
      - name: business_entity_id
        description: "供应商业务实体ID（主键）"
        tests: [unique, not_null]
      - name: account_number
        description: "供应商账户号"
      - name: vendor_name
        description: "供应商名称"
      - name: credit_rating
        description: "信用评级"
      - name: preferred_vendor_status
        description: "是否首选供应商"
      - name: active_flag
        description: "是否启用"
      - name: purchasing_web_service_url
        description: "采购Web服务URL"

  - name: dim_location
    description: |-
      库位维度表。
      
      上游：stg_production_location
    columns:
      - name: location_id
        description: "库位ID（主键）"
        tests: [unique, not_null]
      - name: name
        description: "库位名称"
      - name: cost_rate
        description: "成本费率"
      - name: availability
        description: "可用率"

  - name: dim_sales_person
    description: |-
      销售人员维度表。
      
      上游：stg_sales_sales_person
    columns:
      - name: business_entity_id
        description: "销售人员业务实体ID（主键）"
        tests: [unique, not_null]
      - name: territory_id
        description: "销售区域ID"
      - name: sales_quota
        description: "销售配额"
      - name: bonus
        description: "奖金"
      - name: commission_pct
        description: "提成比例"
      - name: sales_ytd
        description: "年初至今销售额"
      - name: sales_last_year
        description: "去年销售额"

  - name: dim_sales_reason
    description: |-
      销售原因维度表。
      
      上游：stg_sales_sales_reason
    columns:
      - name: sales_reason_id
        description: "销售原因ID（主键）"
        tests: [unique, not_null]
      - name: reason_name
        description: "原因名称"
      - name: reason_type
        description: "原因类型"

  - name: dim_employee
    description: |-
      员工维度表。
      
      上游：stg_hr_employee
    columns:
      - name: business_entity_id
        description: "员工业务实体ID（主键）"
        tests: [unique, not_null]
      - name: national_id_number
        description: "身份证号"
      - name: login_id
        description: "登录ID"
      - name: organization_node
        description: "组织节点"
      - name: organization_level
        description: "组织层级"
      - name: job_title
        description: "职位"
      - name: birth_date
        description: "出生日期"
      - name: marital_status
        description: "婚姻状况"
      - name: gender
        description: "性别"
      - name: hire_date
        description: "入职日期"
      - name: salaried_flag
        description: "是否受薪员工"
      - name: vacation_hours
        description: "带薪休假小时数"
      - name: sick_leave_hours
        description: "病假小时数"
      - name: current_flag
        description: "是否当前员工"

  - name: dim_department
    description: |-
      部门维度表。
      
      上游：stg_hr_department
    columns:
      - name: department_id
        description: "部门ID（主键）"
        tests: [unique, not_null]
      - name: name
        description: "部门名称"
      - name: group_name
        description: "部门组名"

  - name: fct_purchasing
    description: |-
      采购事实表 — 行级粒度（每行一个 purchase order detail）。
      
      上游：int_purchase_details
      用于采购分析和供应商绩效评估
    columns:
      - name: purchase_order_detail_id
        description: "明细行ID（主键）"
        tests: [unique, not_null]
      - name: purchase_order_id
        description: "采购订单ID"
      - name: vendor_id
        description: "供应商ID"
      - name: product_id
        description: "产品ID"
      - name: order_date
        description: "订单日期"
      - name: order_qty
        description: "订购数量"
      - name: unit_price
        description: "单价"
      - name: line_total
        description: "行总额"
      - name: received_qty
        description: "已收数量"
      - name: rejected_qty
        description: "拒收数量"
      - name: stocked_qty
        description: "入库数量"
      - name: vendor_name
        description: "供应商名称"
      - name: product_name
        description: "产品名称"

  - name: fm_production_work_orders
    description: |-
      工单事实表 — 行级粒度（每行一个工单）。
      
      上游：int_work_order_details
      用于生产绩效分析和成本核算
    columns:
      - name: work_order_id
        description: "工单ID（主键）"
        tests: [unique, not_null]
      - name: product_id
        description: "产品ID"
      - name: order_qty
        description: "订购数量"
      - name: stocked_qty
        description: "已入库数量"
      - name: scrapped_qty
        description: "报废数量"
      - name: scrap_reason_name
        description: "报废原因名称"
      - name: total_actual_resource_hrs
        description: "实际总工时"
      - name: total_planned_cost
        description: "计划总成本"
      - name: total_actual_cost
        description: "实际总成本"
      - name: location_name
        description: "库位名称"
      - name: start_date
        description: "开始日期"
      - name: end_date
        description: "结束日期"
      - name: due_date
        description: "截止日期"

  - name: fct_orders
    description: "{{ doc('fct_orders_description') }}"
    config:
      tags: ['finance', 'core']
    columns:
      - name: sales_order_id
        description: "销售订单ID（主键）"
        tests: [unique, not_null]
      - name: order_date
        description: "订单日期"
        tests:
          - not_null
      - name: customer_id
        description: "客户ID（外键 → stg_customer）"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customer')
                field: customer_id
      - name: account_number
        description: "客户账号"
      - name: subtotal
        description: "订单小计金额"
      - name: tax_amt
        description: "税费"
      - name: freight
        description: "运费"
      - name: total_due
        description: "{{ doc('fct_orders_total_due') }}"
        tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: status_code
        description: "订单状态代码（1=进行中/2=已批准/3=已退回/4=已拒绝/5=已发货/6=已取消）"
      - name: is_online_order
        description: "是否在线订单"
      - name: territory_id
        description: "销售区域ID"
      - name: ship_method_id
        description: "配送方式ID"
      - name: territory_name
        description: "销售区域名称"
      - name: region_group
        description: "大区分组"
      - name: ship_method_name
        description: "配送方式名称"
      - name: status_label
        description: "订单状态中文标签"
