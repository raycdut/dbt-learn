version: 2

models:
  - name: fct_orders
    description: "{{ doc('fct_orders_description') }}"
    config:
      tags: ['finance', 'core']
    columns:
      - name: sales_order_id
        description: "销售订单ID（主键）"
        tests: [unique, not_null]
      - name: order_date
        description: "订单日期"
        tests:
          - not_null
      - name: customer_id
        description: "客户ID（外键 → stg_customer）"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customer')
                field: customer_id
      - name: account_number
        description: "客户账号"
      - name: subtotal
        description: "订单小计金额"
      - name: tax_amt
        description: "税费"
      - name: freight
        description: "运费"
      - name: total_due
        description: "{{ doc('fct_orders_total_due') }}"
        tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: status_code
        description: "订单状态代码（1=进行中/2=已批准/3=已退回/4=已拒绝/5=已发货/6=已取消）"
      - name: is_online_order
        description: "是否在线订单"
      - name: status_label
        description: "订单状态中文标签"
